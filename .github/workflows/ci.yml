name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: TypeScript check
        run: npx tsc --noEmit

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses & install platform
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" >/dev/null 2>&1 || true
      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1
      - name: Create debug keystore
        working-directory: android/app
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -storepass android -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,OU=,O=,L=,S=,C="
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hifz-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
