name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: 17

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: TypeScript check
        run: npx tsc --noEmit

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Debug env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "no sdk dir 1"
          ls -la $ANDROID_HOME 2>/dev/null || echo "no ANDROID_HOME"
          ls -la $ANDROID_SDK_ROOT 2>/dev/null || echo "no ANDROID_SDK_ROOT"
          echo "--- platforms ---"
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "no platforms"
          echo "--- build-tools ---"  
          ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "no build-tools"
      - name: Install dependencies
        run: npm install
      - name: Build Android APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          npx react-native build-android --mode=debug 2>&1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hifz-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
